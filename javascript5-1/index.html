<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
<div id="overlay">
  <div class="modal-box">
  <p>警告:您即將進入之網頁內容須滿十八歲方可瀏覽。</p>
  <button class="leave">離開</button>
  <button class="over18">是，我已滿18歲</button>
  </div>
  </div>  
  <div class="sexy-img">
<img src="https://images.unsplash.com/photo-1574539602047-548bf9557352?width=800&auto=format&fit
=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8c2V4eSUyMGdpcmx8ZW58MHx8MHx8fDA%3D">
</div>    
  <script>
  const leaveBtn=document.querySelector(".leave");
  const over18Btn=document.querySelector(".over18")

  leaveBtn.addEventListener("click",function(){
    //把瀏覽器的網址列，改成 google 的網址,window是瀏覽器頁面 location是網址相關的屬性(URL) href是鏈結
    window.location.href="http://www.google.com"
  })
  function confirmAge(){
    //把confirmed=yes這個記號寫進網頁提供的cookie屬性裡
    document.cookie="confirmed=yes";
    document.querySelector("#overlay").style.display="none";
  }
  over18Btn.addEventListener("click",confirmAge)
  //如果cookie的文字屬性裡包含正確的字串 運行confirmAge函數取消modal
  if(document.cookie.includes("confirmed=yes")){
   confirmAge()
  }

  document.cookie = "test=123"
</script>
        
</body>
</html>
