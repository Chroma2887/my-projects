<body>
 <div class="type-in">
  <input id="keyname" type="text" placeholder="請輸入您的大名">
 </div>  
  <div class="clothing-classification">
    <select id="clothing-classification">
      <option value="men">男裝</option>
      <option value="woman">女裝</option>
      </select>
  </div>
  <div class="clothing-type">
    <select id="clothing-type">
      <option value="coat">外套</option>
      <option value="sweater">毛衣</option>
      <option value="lower-body-clothes">下半身</option>
    </select>  
  </div>
<div class="quantity">
<!--這邊改number進js用.value拉出來還是字串 placeholder翻譯是佔位符-->
    <input id="quantity" type="number" placeholder="訂購數量">
  </div>  
 <div class="button"> 
  <button class="btn" onclick="booking()">我要訂購</button>
  <button class="btn" onclick="understend ()">認識工廠</button>
 </div>
  <div class="order-detail">
   <h3>您的訂單</h3>
   <p>顧客姓名: <span id="order-name"></span></p>
   <p>服裝類型: <span id="order-clothing-class"></span></p>
   <p>服裝分類: <span id="order-clothing-type"></span></p>
   <p>訂購數量: <span id="order-quantity"></span></p>
   <p>初步估價: <span id="valuation"></span></p>
 </div>
 </body>
